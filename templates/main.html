<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  color:white;
}

/* 🌄 BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: url("{{ url_for('static', filename='main.jpeg') }}") no-repeat center/cover;
  z-index:-2;
}

/* ✨ PARTICLES */
#particles-js{
  position:absolute;
  width:100%;
  height:100%;
  z-index:-1;
}

/* 🧠 CENTER */
.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

/* 💎 BORDER */
.wrapper{
  width:100%;
  max-width:850px;
  padding:2px;
  border-radius:20px;
  background:linear-gradient(90deg,#00eaff,#ff00cc);
}

/* CARD */
.card{
  background:rgba(10,10,30,0.9);
  border-radius:20px;
  padding:20px;
}

/* 🔥 TITLE */
.title{
  text-align:center;
  font-size:1.6rem;
  margin-bottom:15px;
  background:linear-gradient(90deg,#00eaff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* 📦 GRID */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px 18px;
}

/* FIELD */
.field{
  display:flex;
  flex-direction:column;
}

/* LABEL */
label{
  font-size:0.8rem;
  margin-bottom:4px;
  color:#ccc;
}

/* INPUT */
input{
  padding:9px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:0.85rem;
}

input::placeholder{
  color:#888;
}

/* FULL WIDTH */
.full{
  grid-column:1 / -1;
}

/* BUTTON */
.btn{
  margin-top:15px;
  width:100%;
  padding:10px;
  border-radius:25px;
  border:none;
  background:linear-gradient(90deg,#00eaff,#ff00cc);
  color:white;
  font-size:0.95rem;
  cursor:pointer;
}

/* RESULT */
.result{
  margin-top:10px;
  text-align:center;
  font-size:0.9rem;
  color:#ccc;
}

/* 📱 MOBILE */
@media(max-width:768px){
  .form-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div id="particles-js"></div>

<div class="container">
  <div class="wrapper">
    <div class="card">

      <div class="title">Dark Web Threat Analyzer</div>

      <!-- ✅ FORM START -->
      <form action="/analyze" method="POST">

      <div class="form-grid">

        <div class="field">
          <label>Enter Fid</label>
          <input name="fid" placeholder="12345">
        </div>

        <div class="field">
          <label>Enter Protocol</label>
          <input name="protocol" placeholder="TCP">
        </div>

        <div class="field">
          <label>Enter Flag</label>
          <input name="flag" placeholder="SYN / ACK">
        </div>

        <div class="field">
          <label>Enter Packet</label>
          <input name="packet" placeholder="data packet">
        </div>

        <div class="field">
          <label>Enter Sender ID</label>
          <input name="sender" placeholder="user123">
        </div>

        <div class="field">
          <label>Enter Receiver ID</label>
          <input name="receiver" placeholder="user456">
        </div>

        <div class="field">
          <label>Enter Source IP Address</label>
          <input name="src_ip" placeholder="192.168.1.1">
        </div>

        <div class="field">
          <label>Enter Destination IP Address</label>
          <input name="dst_ip" placeholder="10.0.0.2">
        </div>

        <div class="field">
          <label>Enter Source Port</label>
          <input name="src_port" placeholder="8080">
        </div>

        <div class="field">
          <label>Enter Destination Port</label>
          <input name="dst_port" placeholder="443">
        </div>

        <div class="field full">
          <label>Enter Text(optional)</label>
          <input name="text" placeholder="Optional text">
        </div>

        <div class="field full">
          <label>Enter URL</label>
          <input name="url" placeholder="https://example.com">
        </div>

      </div>

      <!-- ✅ SUBMIT BUTTON -->
      <button type="submit" class="btn">Analyze Threat</button>

      </form>
      <!-- ✅ FORM END -->

      <div class="result">Prediction Result Will Appear In Few seconds...</div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 70 },
    color: { value: ["#00eaff","#ff00cc"] },
    size: { value: 3 },
    move: { speed: 1.2 },
    line_linked: { enable: true }
  }
});
</script>

</body>
</html>
