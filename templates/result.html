<!DOCTYPE html>  
<html lang="en">  
<head>  
<meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  
<title>Result - Dark Web Threat Analyzer</title>  
  
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">  
  
<style>  
  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
    font-family:'Orbitron', sans-serif;  
}  
  
body{  
    height:100vh;  
    display:flex;  
    justify-content:center;  
    align-items:center;  
    overflow:hidden;  
    color:white;  
}  
  
/* 🌌 BACKGROUND */  
.bg{  
    position:fixed;  
    width:110%;  
    height:110%;  
     background: url("{{ url_for('static', filename='main.jpeg') }}") no-repeat center/cover;
    animation:floatBg 10s ease-in-out infinite alternate;  
    z-index:-1;  
}  
  
@keyframes floatBg{  
    0%{ transform:scale(1) translate(0,0); }  
    100%{ transform:scale(1.05) translate(-20px,-20px); }  
}  
  
/* 🔙 BACK BUTTON */  
.back-btn{  
    position:absolute;  
    top:20px;  
    left:20px;  
    padding:10px 18px;  
    border:none;  
    border-radius:10px;  
    background:#ff4bff;  
    color:#fff;  
    font-weight:bold;  
    cursor:pointer;  
    box-shadow:0 0 10px #ff4bff;  
    transition:0.3s;  
}  
  
.back-btn:hover{  
    background:#ff1aff;  
    transform:scale(1.05);  
}  
  
/* CONTAINER */  
.container{  
    width:90%;  
    max-width:700px;  
    padding:30px;  
    border-radius:20px;  
    text-align:center;  
  
    background: rgba(0,0,0,0.35);  
    backdrop-filter: blur(12px);  
  
    box-shadow: 0 0 25px rgba(0,255,255,0.6),  
                0 0 50px rgba(255,0,255,0.4);  
}  
  
h1{  
    font-size:2rem;  
    margin-bottom:25px;  
    background: linear-gradient(90deg,#00f7ff,#ff4bff);  
    -webkit-background-clip:text;  
    -webkit-text-fill-color:transparent;  
}  
  
.table{  
    width:100%;  
    padding:20px;  
    border-radius:15px;  
    border:2px solid rgba(255,255,255,0.2);  
}  
  
.row{  
    display:flex;  
    justify-content:space-between;  
    padding:12px 0;  
    border-bottom:1px solid rgba(255,255,255,0.2);  
}  
  
.row:last-child{  
    border-bottom:none;  
}  
  
.label{  
    color:#00f7ff;  
    font-weight:bold;  
}  
  
.value{  
    display:block;  
    font-size:1rem;  
    color:#fff;  
}  
  
.progress{  
    width:100%;  
    height:12px;  
    background:rgba(255,255,255,0.1);  
    border-radius:10px;  
    margin-top:10px;  
    overflow:hidden;  
}  
  
.progress-bar{  
    height:100%;  
    width:0%;  
    background:linear-gradient(90deg,#00f7ff,#ff4bff);  
    transition: width 1.5s ease;  
}  
  
.status-text{  
    margin-top:15px;  
    font-size:1.5rem;  
    font-weight:bold;  
}  
  
.status-icon{  
    margin-top:20px;  
    font-size:70px;  
    text-shadow: 0 0 15px currentColor;  
}  
  
</style>  
</head>  
  
<body>  
  
<div class="bg"></div>  

<!-- 🔙 BACK BUTTON -->
<button class="back-btn" onclick="goBack()">Back ←</button>
  
<div class="container">  
  
    <h1>Dark Web Threat Analyzer</h1>  
  
    <div class="table">  
  
        <div class="row">  
            <div class="label">Category</div>  
            <div class="value" id="category">{{ category }}</div>  
        </div>  
  
        <div class="row">  
            <div class="label">Confidence</div>  
            <div class="value" id="confidence">{{ confidence }}</div>  
        </div>  
  
        <div class="progress">  
            <div class="progress-bar" id="progressBar"></div>  
        </div>  
  
        <div class="row">  
            <div class="label">Status</div>  
            <div class="value" id="status">{{ threat }}</div>  
        </div>  
  
    </div>  
  
    <div class="status-icon" id="statusIcon"></div>  
    <div class="status-text" id="statusText"></div>  
  
</div>  
  
<script>

// BACK BUTTON
function goBack(){
    window.location.href = "/main";
}

// GET VALUES
let confidenceRaw = document.getElementById("confidence").textContent.trim();
let statusRaw = document.getElementById("status").textContent.trim().toLowerCase();

// PROGRESS BAR
let confidence = parseFloat(confidenceRaw);
if(!isNaN(confidence)){
    document.getElementById("progressBar").style.width = confidence + "%";
}

// ELEMENTS
let icon = document.getElementById("statusIcon");
let statusText = document.getElementById("statusText");

// ALWAYS SHOW
icon.style.display = "block";
statusText.style.display = "block";

// STATUS LOGIC
if(statusRaw.includes("threat")){
    
    icon.innerHTML = "⚠";
    icon.style.color = "red";

    statusText.innerHTML = "<b>Threat Found !</b>";
    statusText.style.color = "red";

}
else{

    icon.innerHTML = "✔";
    icon.style.color = "lime";

    statusText.innerHTML = "<b>Safe</b>";
    statusText.style.color = "lime";

}

</script>
  
</body>  
</html>
